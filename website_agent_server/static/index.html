<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Website Agent Server</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar" aria-label="Browser controls">
        <div id="browser-controls" class="browser-controls">
          <button id="back-button" class="tool-button" type="button" title="Back" disabled>Back</button>
          <button id="forward-button" class="tool-button" type="button" title="Forward" disabled>Forward</button>
          <button id="reload-button" class="tool-button" type="button" title="Reload" disabled>Reload</button>
          <button id="cookie-button" class="tool-button" type="button" title="Cookies" disabled>Cookie</button>
          <button id="quit-button" class="danger-button" type="button" title="Quit" disabled>Quit</button>
        </div>
        <p id="locked-message" class="locked-message" hidden>website agent server: options locked.</p>
        <form id="address-form" class="address-form" autocomplete="off">
          <input
            id="address-input"
            name="address"
            type="text"
            inputmode="url"
            placeholder="https://example.com"
            spellcheck="false"
            disabled
          />
          <button id="go-button" class="primary-button" type="submit" disabled>Go</button>
        </form>
        <span id="status-text" class="status-text">Idle</span>
      </header>

      <section id="viewport-wrap" class="viewport-wrap" aria-label="Remote browser viewport">
        <canvas id="viewport" tabindex="0"></canvas>
        <div id="remote-caret" class="remote-caret" hidden></div>
        <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-busy="true" hidden>
          <div class="loading-indicator">
            <span class="loading-spinner" aria-hidden="true"></span>
            <span id="loading-text" class="loading-text">Server loading ...</span>
          </div>
        </div>
        <textarea
          id="input-proxy"
          class="input-proxy"
          aria-label="Remote text input"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          inputmode="text"
          enterkeyhint="done"
          spellcheck="false"
        ></textarea>
      </section>
    </main>

    <div id="launcher" class="launcher-backdrop" hidden>
      <form id="launch-form" class="launcher" autocomplete="off">
        <h1>Website Agent Server</h1>
        <label for="target-url">Website URL</label>
        <div class="launch-row">
          <input
            id="target-url"
            name="target-url"
            type="text"
            inputmode="url"
            placeholder="https://example.com"
            spellcheck="false"
            required
            autofocus
          />
          <button class="primary-button" type="submit">Open</button>
        </div>
        <p id="launch-error" class="error-text" role="alert"></p>
      </form>
    </div>

    <div id="cookie-dialog" class="modal-backdrop" hidden>
      <section class="modal-panel cookie-panel" role="dialog" aria-modal="true" aria-labelledby="cookie-title">
        <header class="modal-header">
          <div>
            <h2 id="cookie-title">Cookies</h2>
            <p id="cookie-summary" class="modal-subtitle">Current page</p>
            <p id="cookie-sync-status" class="cookie-sync-status" hidden></p>
          </div>
          <div class="modal-actions">
            <button id="cookie-refresh-button" class="tool-button" type="button">Refresh</button>
            <button id="cookie-close-button" class="icon-button" type="button" title="Close" aria-label="Close">x</button>
          </div>
        </header>
        <div id="cookie-error" class="modal-error" role="alert"></div>
        <div class="cookie-editor">
          <div id="cookie-list" class="cookie-list"></div>
          <section class="cookie-json-panel" aria-label="Cookie JSON editor">
            <header class="cookie-json-header">
              <span>JSON</span>
              <button id="cookie-json-restore-button" class="tool-button" type="button">Restore</button>
            </header>
            <textarea
              id="cookie-json-input"
              class="cookie-json-input"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
            ></textarea>
          </section>
        </div>
        <footer class="modal-footer">
          <button id="cookie-add-button" class="tool-button" type="button">Add</button>
          <span id="cookie-count" class="cookie-count"></span>
          <button id="cookie-cancel-button" class="tool-button" type="button">Cancel</button>
          <button id="cookie-save-button" class="primary-button" type="button">Save</button>
        </footer>
      </section>
    </div>

    <div id="browser-dialog" class="modal-backdrop browser-dialog-backdrop" hidden>
      <section class="modal-panel browser-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="browser-dialog-title">
        <header class="modal-header">
          <div>
            <h2 id="browser-dialog-title">Website Dialog</h2>
            <p id="browser-dialog-subtitle" class="modal-subtitle">Remote page request</p>
          </div>
        </header>
        <div class="browser-dialog-body">
          <p id="browser-dialog-message" class="browser-dialog-message"></p>
          <label id="browser-dialog-input-label" class="browser-dialog-input-label" for="browser-dialog-input" hidden>
            <span>Response</span>
            <input
              id="browser-dialog-input"
              type="text"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
          </label>
        </div>
        <footer class="modal-footer browser-dialog-footer">
          <button id="browser-dialog-cancel-button" class="tool-button" type="button">Cancel</button>
          <button id="browser-dialog-ok-button" class="primary-button" type="button">OK</button>
        </footer>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
